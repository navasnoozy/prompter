name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.88.0
          components: clippy, rustfmt
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Verify version alignment
        run: npm run check:versions

      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=low

      - name: Frontend tests with coverage
        run: npm run test -- --coverage

      - name: Lint
        run: npm run lint

      - name: Typecheck and build
        run: npm run build

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust clippy
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Rust dependency audit
        run: cargo audit --file src-tauri/Cargo.lock

      - name: Build universal macOS app and DMG
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Verify universal application and DMG container
        run: |
          lipo src-tauri/target/universal-apple-darwin/release/bundle/macos/Prompter.app/Contents/MacOS/prompter -verify_arch arm64 x86_64
          dmgs=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          test "${#dmgs[@]}" -eq 1
          hdiutil verify "${dmgs[0]}"

  scheduled-audit:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.23.1
          cache: npm

      - name: Audit JavaScript dependencies
        run: npm audit --audit-level=low

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: 1.88.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock
